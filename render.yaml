services:
  - type: web
    name: forge2-kanban-api
    runtime: php
    rootDir: kanban-api
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Forge2 Kanban
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: forge2-kanban-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: HERMES_WEBHOOK_URL
        sync: false
      - key: OPENCLAW_WEBHOOK_URL
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_AGENT_CHANNELS
        value: sprint-main,agent-coder,agent-log

databases:
  - name: forge2-kanban-db
    plan: free
